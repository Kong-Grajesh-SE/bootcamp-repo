# =============================================================================
# Step 04 - Semantic Cache (plugin-only)
# Caches semantically similar responses using Mistral embeddings + Redis Cloud.
# Requires: Redis Cloud database with RediSearch module enabled
# Apply: deck file add-plugins -s <state> deck/04-semantic-cache.yaml | deck gateway sync -s -
#
# BEFORE APPLYING - replace these placeholders with your Redis Cloud values:
#   <REDIS_CLOUD_HOST>     - Redis Cloud endpoint hostname
#   <REDIS_CLOUD_PORT>     - Redis Cloud endpoint port (e.g. 16379)
#   <REDIS_CLOUD_PASSWORD> - Redis Cloud default user password
# =============================================================================
plugins:
  - name: ai-semantic-cache
    service: ai-gateway-service
    config:
      embeddings:
        model:
          provider: mistral
          name: mistral-embed
          options:
            upstream_url: https://api.mistral.ai/v1/embeddings
        auth:
          header_name: Authorization
          header_value: 'Bearer ${{ env "DECK_MISTRAL_API_KEY" }}'
      vectordb:
        strategy: redis
        redis:
          host: <REDIS_CLOUD_HOST>
          port: <REDIS_CLOUD_PORT>
          password: <REDIS_CLOUD_PASSWORD>
          ssl: true
          timeout: 2000
          # NOTE: RediSearch vector indexes only work on DB 0 in Redis Stack.
          # All semantic plugins must use database: 0 (isolation is by index name, not DB).
          database: 0
        dimensions: 1024
        distance_metric: cosine
        # 0.2 is loose enough that paraphrased questions hit the cache;
        # tighten to ~0.1 if you see false positives in your demo.
        threshold: 0.2
      cache_control: false
