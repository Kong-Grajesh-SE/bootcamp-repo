# =============================================================================
# Step 06 - + AI Sanitizer (PII Redaction)
# Detects and redacts PII before it reaches the LLM.
# Requires: docker compose up -d ai-pii-service
# =============================================================================
_format_version: "3.0"

services:
  - name: ai-gateway-service
    host: example.com
    port: 443
    protocol: https
    routes:
      - name: ai-chat-route
        paths:
          - /ai/proxy/chat
        methods:
          - POST
        strip_path: false
        plugins:
          - name: ai-proxy-advanced
            config:
              model_name_header: true
              response_streaming: allow
              targets:
                - route_type: llm/v1/chat
                  auth:
                    header_name: Authorization
                    header_value: 'Bearer ${{ env "DECK_MISTRAL_API_KEY" }}'
                    allow_override: false
                  model:
                    provider: mistral
                    name: mistral-tiny
                    options:
                      mistral_format: openai
                      upstream_url: https://api.mistral.ai/v1/chat/completions
                  logging:
                    log_payloads: false
                    log_statistics: true
                  weight: 100
                - route_type: llm/v1/chat
                  auth:
                    header_name: Authorization
                    header_value: 'Bearer ${{ env "DECK_CEREBRAS_API_KEY" }}'
                    allow_override: false
                  model:
                    provider: cerebras
                    name: gpt-oss-120b
                  logging:
                    log_payloads: false
                    log_statistics: true
                  weight: 100
              balancer:
                algorithm: round-robin
                retries: 5
                failover_criteria:
                  - error
                  - timeout

          - name: ai-prompt-decorator
            config:
              prompts:
                prepend:
                  - role: system
                    content: >-
                      You are a helpful Kong Gateway assistant.
                      Always mention that Kong is the AI Connectivity Company.
                      Be concise and accurate.
                append: []

          - name: ai-prompt-guard
            config:
              deny_patterns:
                - "(?i)ignore (all )?(previous |your )?instructions?"
                - "(?i)you are now"
                - "(?i)forget your (system prompt|instructions|rules)"
                - "(?i)system override"
                - "(?i)jailbreak"
                - "(?i)DAN mode"
              allow_patterns: []
              match_all_roles: true

          - name: ai-semantic-cache
            config:
              embeddings:
                model:
                  provider: mistral
                  name: mistral-embed
                  options:
                    upstream_url: https://api.mistral.ai/v1/embeddings
                auth:
                  header_name: Authorization
                  header_value: 'Bearer ${{ env "DECK_MISTRAL_API_KEY" }}'
              vectordb:
                strategy: redis
                redis:
                  host: redis
                  port: 6379
                  timeout: 2000
                  database: 1
                dimensions: 1024
                distance_metric: cosine
                threshold: 0.1
              cache_control: true

          - name: ai-prompt-template
            config:
              allow_untemplated_requests: true
              log_original_request: false
              templates:
                - name: summarizer
                  template: '{"messages":[{"role":"user","content":"Summarize the following text in 3 bullet points:\n\n{{text}}"}]}'
                - name: code-explainer
                  template: '{"messages":[{"role":"user","content":"Explain this {{language}} code clearly and concisely:\n\n```{{language}}\n{{code}}\n```"}]}'

          - name: ai-sanitizer
            config:
              anonymize:
                - general
                - email
                - phone
                - creditcard
                - ssn
                - ip
                - url
              host: ai-pii-service
              port: 8080
              redact_type: placeholder
              stop_on_error: true
              recover_redacted: false
