# =============================================================================
# Step 02 - + Prompt Decorator
# Injects a system prompt into every request automatically.
# =============================================================================
_format_version: "3.0"

services:
  - name: ai-gateway-service
    host: example.com
    port: 443
    protocol: https
    routes:
      - name: ai-chat-route
        paths:
          - /ai/proxy/chat
        methods:
          - POST
        strip_path: false
        plugins:
          - name: ai-proxy-advanced
            config:
              model_name_header: true
              response_streaming: allow
              targets:
                - route_type: llm/v1/chat
                  auth:
                    header_name: Authorization
                    header_value: 'Bearer ${{ env "DECK_MISTRAL_API_KEY" }}'
                    allow_override: false
                  model:
                    provider: mistral
                    name: mistral-tiny
                    options:
                      mistral_format: openai
                      upstream_url: https://api.mistral.ai/v1/chat/completions
                  logging:
                    log_payloads: false
                    log_statistics: true
                  weight: 100
                - route_type: llm/v1/chat
                  auth:
                    header_name: Authorization
                    header_value: 'Bearer ${{ env "DECK_CEREBRAS_API_KEY" }}'
                    allow_override: false
                  model:
                    provider: cerebras
                    name: gpt-oss-120b
                  logging:
                    log_payloads: false
                    log_statistics: true
                  weight: 100
              balancer:
                algorithm: round-robin
                retries: 5
                failover_criteria:
                  - error
                  - timeout

          - name: ai-prompt-decorator
            config:
              prompts:
                prepend:
                  - role: system
                    content: >-
                      You are a helpful Kong Gateway assistant.
                      Always mention that Kong is the AI Connectivity Company.
                      Be concise and accurate.
                append: []
