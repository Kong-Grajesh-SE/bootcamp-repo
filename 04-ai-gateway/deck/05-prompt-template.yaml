# =============================================================================
# Step 05 — Prompt Templates (plugin-only)
# Named templates with variable substitution for standardised LLM interactions.
# Apply: deck file add-plugins -s <state> deck/05-prompt-template.yaml | deck gateway sync -s -
# =============================================================================
plugins:
  - name: ai-prompt-template
    service: ai-gateway-service
    config:
      allow_untemplated_requests: true
      log_original_request: false
      templates:
        - name: summarizer
          template: '{"messages":[{"role":"user","content":"Summarize the following text in 3 bullet points:\n\n{{text}}"}]}'
        - name: code-explainer
          template: '{"messages":[{"role":"user","content":"Explain this {{language}} code clearly and concisely:\n\n```{{language}}\n{{code}}\n```"}]}'
        - name: email-drafter
          template: '{"messages":[{"role":"user","content":"Draft a professional email with subject \"{{subject}}\" to {{recipient}}.\n\nContext: {{context}}\n\nTone: {{tone}}"}]}'
        - name: api-designer
          template: '{"messages":[{"role":"user","content":"Design a RESTful API for {{resource}}. Include:\n- Resource name\n- 5 key endpoints (method + path)\n- Request/response schema for each\n- Authentication strategy"}]}'
