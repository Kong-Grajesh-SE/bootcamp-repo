# =============================================================================
# Step 06 - AI Sanitizer / PII Redaction (plugin-only)
# Detects and redacts PII before it reaches the LLM.
# Requires: PII service exposed via ngrok (or any public endpoint)
# Apply: deck file add-plugins -s <state> deck/06-ai-sanitizer.yaml | deck gateway sync -s -
#
# BEFORE APPLYING - replace these placeholders with your PII service values:
#   <PII_SERVICE_HOST> - ngrok hostname (e.g. abc123.ngrok-free.app)
#   <PII_SERVICE_PORT> - ngrok port (443 for ngrok HTTPS tunnels)
# =============================================================================
plugins:
  - name: ai-sanitizer
    service: ai-gateway-service
    config:
      anonymize:
        - general
        - email
        - phone
        - creditcard
        - ssn
        - ip
        - url
      host: <PII_SERVICE_HOST>
      port: <PII_SERVICE_PORT>
      redact_type: placeholder
      stop_on_error: true
      recover_redacted: false
