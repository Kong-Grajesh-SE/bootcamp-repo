# =============================================================================
# Step 06 - AI Sanitizer / PII Redaction (plugin-only)
# Detects and redacts PII before it reaches the LLM.
# Requires: docker compose up -d ai-pii-service
# Apply: deck file add-plugins -s <state> deck/06-ai-sanitizer.yaml | deck gateway sync -s -
# =============================================================================
plugins:
  - name: ai-sanitizer
    service: ai-gateway-service
    config:
      anonymize:
        - general
        - email
        - phone
        - creditcard
        - ssn
        - ip
        - url
      host: host.docker.internal
      port: 8086
      redact_type: placeholder
      stop_on_error: true
      recover_redacted: false
