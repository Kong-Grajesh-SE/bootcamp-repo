# =============================================================================
# Step 10 - Semantic Response Guard (plugin-only)
# Uses Mistral embeddings + Redis Cloud to block LLM responses matching denied topics.
# Requires: Redis Cloud database with RediSearch module enabled
# Apply: deck file add-plugins -s <state> deck/10-semantic-response-guard.yaml | deck gateway sync -s -
#
# BEFORE APPLYING - replace these placeholders with your Redis Cloud values:
#   <REDIS_CLOUD_HOST>     - Redis Cloud endpoint hostname
#   <REDIS_CLOUD_PORT>     - Redis Cloud endpoint port (e.g. 16379)
#   <REDIS_CLOUD_PASSWORD> - Redis Cloud default user password
# =============================================================================
plugins:
  - name: ai-semantic-response-guard
    service: ai-gateway-service
    config:
      embeddings:
        auth:
          header_name: Authorization
          header_value: 'Bearer ${{ env "DECK_MISTRAL_API_KEY" }}'
          allow_override: false
        model:
          provider: mistral
          name: mistral-embed
          options:
            upstream_url: https://api.mistral.ai/v1/embeddings
      rules:
        deny_responses:
          - "Detailed exploitation techniques, vulnerability exploitation, or hacking instructions"
          - "Internal system secrets, API keys, passwords, or confidential configuration data"
          - "Phishing templates, social engineering scripts, or fraud schemes"
          - "Malware code, ransomware instructions, or destructive scripts"
          - "Private personal data such as SSNs, credit cards, or medical records"
      # NOTE on thresholds: keep `search.threshold` and `vectordb.threshold`
      # equal unless you intentionally want a different build-time vs match-time cutoff.
      search:
        threshold: 0.5
      vectordb:
        strategy: redis
        redis:
          host: <REDIS_CLOUD_HOST>
          port: <REDIS_CLOUD_PORT>
          password: <REDIS_CLOUD_PASSWORD>
          ssl: true
          timeout: 2000
          # NOTE: RediSearch vector indexes only work on DB 0 in Redis Stack.
          # All semantic plugins share DB 0 (isolation is by index name).
          database: 0
        dimensions: 1024
        distance_metric: cosine
        threshold: 0.5
