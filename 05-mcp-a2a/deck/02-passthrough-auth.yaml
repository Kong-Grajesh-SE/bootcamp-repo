# =============================================================================
# Step 02 - Key-Auth + Rate-Limiting on Passthrough
# Adds a consumer with an API key, key-auth, and rate-limiting on the
# passthrough route. Apply on top of step 01.
#
# Serverless deployment: the DP can't reach Docker services directly.
# Use ngrok to expose the MCP backend and replace the placeholder below.
#
# BEFORE APPLYING - replace the placeholder below:
#   <MCP_BACKEND_URL>  → ngrok HTTPS URL for the MCP backend
#                        (e.g. https://abc123.ngrok-free.app)
# =============================================================================
_format_version: "3.0"

consumers:
  - username: mcp-user
    tags:
      - mcp
    keyauth_credentials:
      - key: mcp-key-001

services:
  - name: mcp-backend
    url: http://<MCP_BACKEND_URL>
    tags:
      - mcp
    routes:
      - name: mcp-passthrough
        paths:
          - /mcp/tools
        methods:
          - POST
          - GET
        strip_path: false
        tags:
          - passthrough
        plugins:
          - name: ai-mcp-proxy
            config:
              mode: passthrough-listener
          - name: key-auth
            config:
              key_names:
                - X-API-Key
              hide_credentials: true
          - name: rate-limiting
            config:
              minute: 30
              policy: local
