# =============================================================================
# Step 05 - MCP + OAuth2 / PKCE
# Creates a second MCP service (with /mcp path prefix) and route that
# requires OAuth2 tokens validated against Auth0. The ai-mcp-oauth2
# plugin handles MCP OAuth 2.0 spec validation; ai-mcp-proxy in
# passthrough-listener mode forwards the authenticated request.
#
# Prerequisites: an Auth0 tenant with:
#   - A Machine-to-Machine application (for client_credentials flow)
#   - A Single Page Application with PKCE enabled (for authorization_code flow)
#   - An API (audience) registered for token validation
#
# BEFORE APPLYING - replace the placeholders below:
#   <AUTH0_DOMAIN>     → your Auth0 tenant domain (e.g. my-tenant.us.auth0.com)
#   <MCP_BACKEND_URL>  → ngrok HTTPS URL for the MCP backend
#                        (e.g. https://abc123.ngrok-free.app)
# =============================================================================
_format_version: "3.0"

services:
  - name: mcp-backend-oauth
    url: http://<MCP_BACKEND_URL>
    path: /mcp
    tags:
      - mcp
      - oauth
    routes:
      - name: mcp-oauth
        paths:
          - /mcp-oauth
        methods:
          - POST
          - GET
        strip_path: true
        tags:
          - oauth2
        plugins:
          - name: ai-mcp-oauth2
            config:
              resource: $PROXY_URL/mcp-oauth/tools
              authorization_servers:
                - https://<AUTH0_DOMAIN>/
              jwks_endpoint: https://<AUTH0_DOMAIN>/.well-known/jwks.json
              # DEMO ONLY - relaxes RFC 8707 audience binding so a token issued
              # without an explicit `audience` claim still validates. Do NOT
              # ship this to production: pair the IdP-side resource indicator
              # with strict validation instead.
              insecure_relaxed_audience_validation: true
              claim_to_header:
                - claim: sub
                  header: X-User-Id
                - claim: preferred_username
                  header: X-User-Name
          - name: ai-mcp-proxy
            config:
              mode: passthrough-listener
