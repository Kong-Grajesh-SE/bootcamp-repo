# ngrok multi-tunnel config for the MCP + OPA guardrails demo.
#
# Only needed if you're running a Konnect Serverless data plane (which can't
# reach Docker services directly). For a Docker hybrid DP, the deck file uses
# host.docker.internal with host-mapped ports - skip this file entirely.
#
# Prerequisites:
#   1. ngrok account + authtoken: ngrok config add-authtoken <token>
#   2. Both services running: docker compose up -d mcp-tool-server opa-policy-service
#
# Start both tunnels:
#   ngrok start --all --config ngrok-mcp-guardrails.yml
#
# After starting, update deck/07-mcp-guardrails.yaml:
#   - service URL         → the mcp-server ngrok HTTPS URL
#   - opa_host            → the guardrail ngrok hostname (without https://)
#   - opa_port            → 443
#   - opa_protocol        → https

version: "3"

tunnels:
  mcp-tool-server:
    proto: http
    addr: 8092

  opa-policy-service:
    proto: http
    addr: 8089
