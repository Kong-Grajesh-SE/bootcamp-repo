# =============================================================================
# Agentic AI Bootcamp - Docker Compose
# Kong Gateway 3.14+ (Enterprise) + MCP Backend + Keycloak
# =============================================================================
services:
  # ── Kong Gateway (Data Plane) ────────────────────────────────────────────
  # ── MCP Travel Backend ──────────────────────────────────────────────────
  # NOTE: Kong Gateway is NOT in this compose file.
  # Kong is already running in hybrid mode (connected to Konnect).
  # Labs configure Kong via Admin API at http://localhost:8001.

  # ── MCP Travel Backend ──────────────────────────────────────────────────
  mcp-backend:
    build: ./mcp-server
    container_name: mcp-backend
    ports:
      - "3001:3001"
    networks:
      - kong-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Keycloak (OIDC Provider for Module 02) ─────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak/realm-workshop.json:/opt/keycloak/data/import/realm-workshop.json:ro
    ports:
      - "8080:8080"
    networks:
      - kong-net
    restart: unless-stopped

networks:
  kong-net:
    driver: bridge
