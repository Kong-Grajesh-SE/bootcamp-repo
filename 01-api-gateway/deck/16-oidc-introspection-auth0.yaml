_format_version: "3.0"
# ---------------------------------------------------------------------------
# OpenID Connect with Auth0 + INTROSPECTION - SERVERLESS deployment
#
# Same as 16-oidc-auth0.yaml but with token introspection enabled.
# Instead of validating JWT tokens offline (JWKS), Kong calls Auth0's
# introspect endpoint on EVERY request to check "is this token still active?".
#
# Trade-off:
#   - Slower (one HTTP call per request to Auth0)
#   - But revocation takes effect IMMEDIATELY
#   - Also works with opaque (non-JWT) tokens
#
# BEFORE APPLYING - replace the same placeholders as 16-oidc-auth0.yaml:
#   <AUTH0_DOMAIN>, <AUTH0_CLIENT_ID>, <AUTH0_CLIENT_SECRET>, <SERVERLESS_PROXY_URL>
# ---------------------------------------------------------------------------
plugins:
- name: openid-connect
  service: httpbun-service
  config:
    issuer: https://<AUTH0_DOMAIN>/
    cache_tokens_salt: bootcamp-oidc-salt-change-me
    client_id:
    - <AUTH0_CLIENT_ID>
    client_secret:
    - <AUTH0_CLIENT_SECRET>
    auth_methods:
    - password
    - bearer
    - client_credentials
    scopes:
    - openid
    - profile
    - email
    redirect_uri:
    - <SERVERLESS_PROXY_URL>/httpbun/auth/callback
    login_action: response
    logout_uri_suffix: /logout
    upstream_access_token_header: authorization
    upstream_headers_claims:
    - nickname
    - email
    upstream_headers_names:
    - x-authenticated-user
    - x-authenticated-email
    # ── Introspection (RFC 7662) ───────────────────────────────────────────
    introspection_endpoint: https://<AUTH0_DOMAIN>/oauth/introspect
    introspect_jwt_tokens: true
    introspection_endpoint_auth_method: client_secret_basic
    cache_introspection: false
