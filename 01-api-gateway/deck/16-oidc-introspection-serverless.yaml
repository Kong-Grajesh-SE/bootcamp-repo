_format_version: "3.0"
# ---------------------------------------------------------------------------
# OpenID Connect with Keycloak + INTROSPECTION — SERVERLESS deployment
#
# Same as 16-oidc-keycloak-serverless.yaml but with token introspection enabled.
# Instead of validating JWT tokens offline (JWKS), Kong calls Keycloak's
# introspect endpoint on EVERY request to check "is this token still active?".
#
# Trade-off:
#   • Slower (one HTTP call per request to Keycloak)
#   • But revocation/logout takes effect IMMEDIATELY
#   • Also works with opaque (non-JWT) tokens
#
# BEFORE APPLYING:
#   1. Start Keycloak:   cd ../keycloak && docker compose up -d
#   2. Expose via ngrok: ngrok http 8080
#   3. Replace <NGROK_URL> below with your ngrok https URL
#   4. Replace <SERVERLESS_PROXY_URL> with your serverless DP proxy URL
# ---------------------------------------------------------------------------
plugins:
- name: openid-connect
  service: httpbun-service
  config:
    # ── REPLACE with your ngrok URL ──
    issuer: https://9805-49-249-135-74.ngrok-free.app/realms/bootcamp
    cache_tokens_salt: bootcamp-oidc-salt-change-me
    client_id:
    - kong
    client_secret:
    - kong-bootcamp-client-secret-replace-in-prod
    auth_methods:
    - password
    - bearer
    - client_credentials
    scopes:
    - openid
    - profile
    - email
    # ── REPLACE with your serverless proxy URL ──
    redirect_uri:
    - https://95fa62461d.us.serverless.gateways.konggateway.com//httpbun/auth/callback
    login_action: response
    logout_uri_suffix: /logout
    upstream_access_token_header: authorization
    upstream_headers_claims:
    - preferred_username
    - email
    upstream_headers_names:
    - x-authenticated-user
    - x-authenticated-email
    # ── Introspection (RFC 7662) ───────────────────────────────────────────
    # REPLACE <NGROK_URL> with the same ngrok URL used for issuer above.
    introspection_endpoint: https://9805-49-249-135-74.ngrok-free.app/realms/bootcamp/protocol/openid-connect/token/introspect
    introspect_jwt_tokens: true
    introspection_endpoint_auth_method: client_secret_basic
    cache_introspection: false
