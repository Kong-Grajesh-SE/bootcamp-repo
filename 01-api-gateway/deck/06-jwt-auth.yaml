_format_version: "3.0"
plugins:
- name: jwt
  service: httpbun-service
  config:
    claims_to_verify:
    - exp
    header_names:
    - Authorization
    key_claim_name: iss
    secret_is_base64: false
    run_on_preflight: true
    uri_param_names:
    - jwt
# NOTE: The HS256 `secret` below is a placeholder for the bootcamp.
# Before applying, replace `<REPLACE-WITH-RANDOM-SECRET>` with a value generated by:
#   openssl rand -hex 32
# In production, prefer RS256 with a private key held by the issuer and the
# public key (or JWKS URL) configured on the JWT plugin.
consumers:
- username: jwt-user
  custom_id: jwt-001
  jwt_secrets:
  - algorithm: HS256
    key: my-jwt-issuer
    secret: <REPLACE-WITH-RANDOM-SECRET>
