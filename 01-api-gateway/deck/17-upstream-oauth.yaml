_format_version: "3.0"
# ---------------------------------------------------------------------------
# Upstream OAuth - Kong as the OAuth *client* (mirror image of step 16)
#
# Steps 15/16 validated tokens coming FROM callers. upstream-oauth is the
# opposite direction: Kong itself fetches a client_credentials token from the
# IdP and injects it as `Authorization: Bearer <token>` on the UPSTREAM request.
# Your backend gets a valid M2M token without the caller knowing anything about
# OAuth. (Reference: https://developer.konghq.com/plugins/upstream-oauth/)
#
# Scoped to httpbin-service, whose `/headers` echoes what the upstream received —
# so you can literally see the token Kong added.
#
# Uses the shared Keycloak's `kong-m2m` client (realm `bootcamp`). Spin it up:
#     cd ../keycloak && docker compose up -d
#
# NOTE: unlike step 16, there is NO issuer/`iss` matching here — Kong is the
# client, not the validator, so it just forwards the token upstream. You only
# need the token_endpoint reachable FROM the Kong DP container
# (host.docker.internal resolves to the host machine from inside Docker).
# ---------------------------------------------------------------------------
plugins:
- name: upstream-oauth
  service: httpbun-service
  config:
    oauth:
      token_endpoint: http://host.docker.internal:8080/realms/bootcamp/protocol/openid-connect/token
      client_id: kong-m2m
      client_secret: kong-m2m-client-secret-replace-in-prod
      grant_type: client_credentials
      scopes:
      - openid
    client:
      # kong-m2m is a confidential client - send client_id/secret in the body.
      auth_method: client_secret_post
    behavior:
      # Header injected on the upstream request (default is Authorization).
      upstream_access_token_header_name: Authorization
      # If the upstream rejects the token, drop it from cache and re-fetch.
      purge_token_on_upstream_status_codes:
      - 401
    cache:
      # Cache the fetched token so Kong isn't hitting the IdP on every request.
      strategy: memory
      default_ttl: 3600
      eagerly_expire: 5
