_format_version: "3.0"
# ---------------------------------------------------------------------------
# Upstream OAuth - Kong as the OAuth *client* (mirror image of step 16)
#
# Steps 15/16 validated tokens coming FROM callers. upstream-oauth is the
# opposite direction: Kong itself fetches a client_credentials token from the
# IdP and injects it as `Authorization: Bearer <token>` on the UPSTREAM request.
# Your backend gets a valid M2M token without the caller knowing anything about
# OAuth. (Reference: https://developer.konghq.com/plugins/upstream-oauth/)
#
# Scoped to httpbun-service, whose `/headers` echoes what the upstream received —
# so you can literally see the token Kong added.
#
# BEFORE APPLYING - replace the placeholders:
#   <AUTH0_DOMAIN>            → Auth0 tenant domain
#   <AUTH0_M2M_CLIENT_ID>     → Machine-to-Machine application client ID
#   <AUTH0_M2M_CLIENT_SECRET> → Machine-to-Machine application client secret
#   <AUTH0_API_AUDIENCE>      → API audience identifier (optional, for scoped tokens)
#
# Auth0 setup:
#   1. Create a Machine-to-Machine application in Auth0
#   2. Authorize it against your API (audience)
#   3. Grant the scopes you need (or leave empty for default)
# ---------------------------------------------------------------------------
plugins:
- name: upstream-oauth
  service: httpbun-service
  config:
    oauth:
      token_endpoint: https://<AUTH0_DOMAIN>/oauth/token
      client_id: <AUTH0_M2M_CLIENT_ID>
      client_secret: <AUTH0_M2M_CLIENT_SECRET>
      grant_type: client_credentials
      scopes:
      - openid
    client:
      auth_method: client_secret_post
    behavior:
      upstream_access_token_header_name: Authorization
      purge_token_on_upstream_status_codes:
      - 401
    cache:
      strategy: memory
      # Token is cached for 1 hour, re-fetched 5 seconds before expiry
      # to avoid serving a request with an about-to-expire token.
      default_ttl: 3600
      eagerly_expire: 5
