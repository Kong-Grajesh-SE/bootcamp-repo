_format_version: "1.0"
add-plugins:
- selectors:
  - "$..services[*]"
  overwrite: false
  plugins:
  - name: cors
    config:
      origins:
      - "*"
      methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
      - PATCH
      headers:
      - Accept
      - Accept-Version
      - Content-Length
      - Content-Type
      - Authorization
      - apikey
      exposed_headers:
      - X-Auth-Token
      - X-Kong-Upstream-Latency
      - X-Kong-Proxy-Latency
      credentials: true
      max_age: 3600
      preflight_continue: false
