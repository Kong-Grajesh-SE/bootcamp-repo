_format_version: "3.0"
plugins:
# Key-Auth to identify consumers
- name: key-auth
  service: httpbin-service
  config:
    key_names:
    - apikey
    hide_credentials: true
# ACL to authorize by group
- name: acl
  service: httpbin-service
  config:
    allow:
    - premium
    - standard
    hide_groups_header: false
consumers:
# Premium consumer — allowed, high rate limit
- username: premium-user
  custom_id: premium-001
  groups:
  - name: premium-tier
  keyauth_credentials:
  - key: premium-key-123
  acls:
  - group: premium
# Standard consumer — allowed, low rate limit
- username: standard-user
  custom_id: standard-002
  groups:
  - name: standard-tier
  keyauth_credentials:
  - key: standard-key-456
  acls:
  - group: standard
# Trial consumer — NOT in allow list, will get 403
- username: trial-user
  custom_id: trial-003
  keyauth_credentials:
  - key: blocked-key-789
  acls:
  - group: trial
consumer_groups:
# Premium tier: 1000 requests/minute
- name: premium-tier
  plugins:
  - name: rate-limiting
    config:
      minute: 1000
      policy: local
# Standard tier: 10 requests/minute
- name: standard-tier
  plugins:
  - name: rate-limiting
    config:
      minute: 10
      policy: local
