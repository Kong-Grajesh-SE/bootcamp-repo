_format_version: "3.0"
upstreams:
- name: demo-upstream
  algorithm: round-robin
  hash_on: none
  healthchecks:
    active:
      http_path: /get
      type: http
      healthy:
        interval: 10
        successes: 3
      unhealthy:
        interval: 10
        http_failures: 3
    passive:
      healthy:
        successes: 5
      unhealthy:
        http_failures: 5
  targets:
  - target: httpbin.org:443
    weight: 50
  - target: httpbun.com:443
    weight: 50
services:
- name: loadbalanced-service
  host: demo-upstream
  port: 443
  protocol: https
  path: /anything
  routes:
  - name: loadbalanced-route
    paths:
    - /lb
    strip_path: true
    protocols:
    - http
    - https
