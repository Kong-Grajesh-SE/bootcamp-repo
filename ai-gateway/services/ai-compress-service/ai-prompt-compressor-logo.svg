<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#171F2E;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Main background -->
  <rect width="1000" height="600" fill="url(#bgGradient)" rx="15" ry="15" />
  
  <!-- Title -->
  <text x="500" y="70" font-family="Arial, sans-serif" font-size="40" fill="#FFFFFF" text-anchor="middle" font-weight="bold">AI Prompt Compressor</text>
  <text x="500" y="100" font-family="Arial, sans-serif" font-size="20" fill="#8B9CB3" text-anchor="middle">Kong AI Gateway Plugin</text>
  
  <!-- Flow Illustration -->
  <g transform="translate(0, 30)">
    <!-- Top section - Flow components -->
    <g transform="translate(0, 80)">
      <!-- Before compression section -->
      <rect x="100" y="80" width="200" height="120" rx="10" ry="10" fill="#1E2430" stroke="#34495E" stroke-width="2"/>
      <text x="200" y="60" font-family="Arial, sans-serif" font-size="18" fill="#FFFFFF" text-anchor="middle">Original Prompt</text>
      
      <g transform="translate(160, 140)">
        <rect x="-40" y="-30" width="160" height="60" rx="5" ry="5" fill="#2E3A4D" stroke="#3A4E68" stroke-width="1"/>
        <text x="40" y="-5" font-family="Courier, monospace" font-size="12" fill="#67D5B5" text-anchor="middle">Large, detailed prompt</text>
        <text x="40" y="15" font-family="Courier, monospace" font-size="12" fill="#67D5B5" text-anchor="middle">with many tokens...</text>
      </g>
      
      <!-- Arrow -->
      <g transform="translate(310, 140)">
        <line x1="0" y1="0" x2="50" y2="0" stroke="#4CAF50" stroke-width="3" stroke-dasharray="5,3"/>
        <polygon points="60,0 50,-5 50,5" fill="#4CAF50"/>
      </g>
      
      <!-- Compression Plugin -->
      <g transform="translate(400, 140)">
        <rect x="-20" y="-60" width="140" height="120" rx="10" ry="10" fill="#1A3156" stroke="#264785" stroke-width="2"/>
        <circle cx="50" cy="0" r="45" fill="#152642" stroke="#264785" stroke-width="2"/>
        
        <!-- Kong logo stylized -->
        <path d="M50,0 m-20,-15 l8,0 l12,15 l-12,15 l-8,0 z" fill="#24C1E0"/>
        <path d="M50,0 m0,-15 l8,0 l12,15 l-12,15 l-8,0 z" fill="#007A87"/>
        
        <!-- Compression arrows -->
        <g transform="translate(50, 0)">
          <line x1="-15" y1="-20" x2="15" y2="-20" stroke="#FFFFFF" stroke-width="2"/>
          <line x1="-15" y1="-10" x2="15" y2="-10" stroke="#FFFFFF" stroke-width="2"/>
          <line x1="-15" y1="0" x2="15" y2="0" stroke="#FFFFFF" stroke-width="2"/>
          <line x1="-15" y1="10" x2="15" y2="10" stroke="#FFFFFF" stroke-width="2"/>
          <line x1="-15" y1="20" x2="15" y2="20" stroke="#FFFFFF" stroke-width="2"/>
          <polygon points="15,-20 20,-17 20,-23" fill="#FFFFFF"/>
          <polygon points="15,-10 20,-7 20,-13" fill="#FFFFFF"/>
          <polygon points="15,0 20,3 20,-3" fill="#FFFFFF"/>
          <polygon points="15,10 20,13 20,7" fill="#FFFFFF"/>
          <polygon points="15,20 20,23 20,17" fill="#FFFFFF"/>
        </g>
        
        <text x="50" y="-95" font-family="Arial, sans-serif" font-size="18" fill="#FFFFFF" text-anchor="middle">AI Prompt</text>
        <text x="50" y="-75" font-family="Arial, sans-serif" font-size="18" fill="#FFFFFF" text-anchor="middle">Compressor</text>
      </g>
      
      <!-- Arrow -->
      <g transform="translate(540, 140)">
        <line x1="0" y1="0" x2="50" y2="0" stroke="#4CAF50" stroke-width="3" stroke-dasharray="5,3"/>
        <polygon points="60,0 50,-5 50,5" fill="#4CAF50"/>
      </g>
      
      <!-- After compression section -->
      <rect x="610" y="80" width="200" height="120" rx="10" ry="10" fill="#1E2430" stroke="#34495E" stroke-width="2"/>
      <text x="700" y="60" font-family="Arial, sans-serif" font-size="18" fill="#FFFFFF" text-anchor="middle">Compressed Prompt</text>
      
      <g transform="translate(670, 140)">
        <rect x="-40" y="-20" width="160" height="40" rx="5" ry="5" fill="#2E3A4D" stroke="#3A4E68" stroke-width="1"/>
        <text x="40" y="5" font-family="Courier, monospace" font-size="12" fill="#67D5B5" text-anchor="middle">Concise, optimized text</text>
      </g>
      
      <!-- Arrow to LLM -->
      <g transform="translate(820, 140)">
        <line x1="0" y1="0" x2="50" y2="0" stroke="#4CAF50" stroke-width="3" stroke-dasharray="5,3"/>
        <polygon points="60,0 50,-5 50,5" fill="#4CAF50"/>
      </g>
      
      <!-- LLM Icon -->
      <g transform="translate(930, 140)">
        <circle cx="0" cy="0" r="40" fill="#0F2647" stroke="#1E4D8C" stroke-width="2"/>
        <path d="M-15,-15 L15,-15 L15,15 L-15,15 Z" fill="none" stroke="#24C1E0" stroke-width="2"/>
        <path d="M-10,-10 L10,-10 M-10,0 L10,0 M-10,10 L10,10" stroke="#24C1E0" stroke-width="2"/>
        <text x="0" y="60" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle">LLM</text>
      </g>
    </g>
    
    <!-- Bottom section - Features -->
    <g transform="translate(150, 350)">
      <rect x="0" y="0" width="700" height="160" rx="10" ry="10" fill="rgba(14, 22, 40, 0.6)" stroke="#2C3F5A" stroke-width="2"/>
      
      <!-- Feature 1 -->
      <g transform="translate(70, 50)">
        <circle cx="0" cy="0" r="20" fill="#152642" stroke="#264785" stroke-width="1"/>
        <path d="M-8,-5 L-2,3 L8,-7 L10,-5 L-2,8 L-10,-2 Z" fill="#4CAF50"/>
        <text x="100" y="5" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle">Lower token usage</text>
      </g>
      
      <!-- Feature 2 -->
      <g transform="translate(70, 110)">
        <circle cx="0" cy="0" r="20" fill="#152642" stroke="#264785" stroke-width="1"/>
        <path d="M-8,-5 L-2,3 L8,-7 L10,-5 L-2,8 L-10,-2 Z" fill="#4CAF50"/>
        <text x="135" y="5" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle">Adjustable compression ratio</text>
      </g>
      
      <!-- Feature 3 -->
      <g transform="translate(350, 50)">
        <circle cx="0" cy="0" r="20" fill="#152642" stroke="#264785" stroke-width="1"/>
        <path d="M-8,-5 L-2,3 L8,-7 L10,-5 L-2,8 L-10,-2 Z" fill="#4CAF50"/>
        <text x="120" y="5" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle">Uses LLM Lingua library</text>
      </g>
      
      <!-- Feature 4 -->
      <g transform="translate(350, 110)">
        <circle cx="0" cy="0" r="20" fill="#152642" stroke="#264785" stroke-width="1"/>
        <path d="M-8,-5 L-2,3 L8,-7 L10,-5 L-2,8 L-10,-2 Z" fill="#4CAF50"/>
        <text x="125" y="5" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle">Target token count control</text>
      </g>
    </g>
  </g>
  
  <!-- Kong AI Gateway branding -->
  <g transform="translate(870, 560)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" fill="#8B9CB3" text-anchor="end">Powered by Kong AI Gateway</text>
  </g>
</svg>
