# =============================================================================
# Step 10 — Semantic Response Guard (plugin-only)
# Uses Mistral embeddings + Redis to block LLM responses matching denied topics.
# Requires: docker compose up -d redis
# Apply: deck file add-plugins -s <state> deck/10-semantic-response-guard.yaml | deck gateway sync -s -
# =============================================================================
plugins:
  - name: ai-semantic-response-guard
    service: ai-gateway-service
    config:
      embeddings:
        auth:
          header_name: Authorization
          header_value: 'Bearer ${{ env "DECK_MISTRAL_API_KEY" }}'
          allow_override: false
        model:
          provider: mistral
          name: mistral-embed
      rules:
        deny_responses:
          - "Detailed exploitation techniques, vulnerability exploitation, or hacking instructions"
          - "Internal system secrets, API keys, passwords, or confidential configuration data"
          - "Phishing templates, social engineering scripts, or fraud schemes"
          - "Malware code, ransomware instructions, or destructive scripts"
          - "Private personal data such as SSNs, credit cards, or medical records"
      search:
        threshold: 0.5
      vectordb:
        strategy: redis
        redis:
          host: host.docker.internal
          port: 6379
          timeout: 2000
          database: 0
        dimensions: 1024
        distance_metric: cosine
        threshold: 0.7
